#
# FORMAT
# ------
# Each CVE entry is a block of key=value lines, terminated by a blank line.
# The parser reads the file top-to-bottom; order determines check sequence.
#
# REQUIRED keys for every entry:
#   cve_id          CVE identifier (used as part of the finding ID)
#   name            Short human-readable name / nickname
#   cvss            CVSS v3 base score (float, e.g. 7.8)
#   severity        CRITICAL | HIGH | MEDIUM (maps to audit finding severity)
#   check_type      How to test for this CVE:
#                     kernel_version   — compare uname -r against version ranges
#                     module_loaded    — check /proc/modules for a named module
#                     socket_family    — try to open a socket (AF_*/SOCK_*)
#                     kernel_symbol    — grep /proc/kallsyms for a symbol name
#                     compound         — multiple sub-checks (specify sub_checks=)
#   introduced      Earliest upstream kernel version affected (x.y or x.y.z)
#                   Use "0" to mean "all versions before the fix"
#   fixed_versions  Space-separated list of stable-series first-clean versions
#                   Format: series:version  e.g.  5.15:5.15.149 6.1:6.1.76
#                   Use "none" if no distro patch is confirmed yet
#   itw             yes | no   — actively exploited in the wild
#   poc_public      yes | no   — public proof-of-concept exists
#   subsystem       Kernel subsystem name (used in report text)
#   module_names    Space-separated list of kernel modules relevant to this CVE
#                   (used by module_loaded check and blacklist recommendations)
#                   Use "none" if no loadable module is involved
#   mitigation      Recommended interim mitigation command (single line, shell)
#                   Use "none" if no module-level mitigation exists
#   what            One-paragraph description (what it is)
#   impact          One-paragraph impact description
#   exploit         One-paragraph exploitability assessment
#   rec             One-paragraph remediation recommendation
#
# OPTIONAL keys:
#   alias           Additional common name(s) for the CVE
#   cisa_kev        yes | no — listed in CISA Known Exploited Vulnerabilities
#   socket_af       AF_* numeric value (required when check_type=socket_family)
#   socket_type     SOCK_* numeric value (required when check_type=socket_family)
#   socket_proto    Protocol numeric value for socket check (default 0)
#   kallsyms_sym    Symbol name to grep in /proc/kallsyms (check_type=kernel_symbol)
#   notes           Free-form notes for operators (not included in audit output)
#
# DISABLED entries: prefix cve_id with '#' to comment out the entire block.
#
# UPDATE POLICY
# -------------
# When a new kernel LTS series is fully patched, add it to fixed_versions.
# When itw status changes, update itw= and optionally bump severity.
# When a CVE is confirmed not to affect a given deployment class, add a note
# under the notes= field — do not remove the entry.
# =============================================================================

# =============================================================================
# SECTION 1: Active in-the-wild (ITW) CVEs — check these first
# =============================================================================

# -----------------------------------------------------------------------------
# Copy Fail — AF_ALG / algif_aead page-cache 4-byte write primitive
# Affects kernels 4.14+ (commit that introduced algif_aead fast path).
# Public 732-byte Python PoC. CISA KEV listed. Container escape confirmed.
# Patched upstream mainline commit: a664bf3d603d (reverts 2017 optimisation).
# -----------------------------------------------------------------------------
cve_id=CVE-2026-31431
name=Copy Fail
alias=CopyFail
cvss=7.8
severity=CRITICAL
check_type=compound
introduced=4.14
fixed_versions=5.15:5.15.182 5.10:5.10.238 6.1:6.1.138 6.6:6.6.88 6.12:6.12.24 6.13:6.13.0 mainline:6.18.22
itw=yes
poc_public=yes
cisa_kev=yes
subsystem=crypto/af_alg
module_names=algif_aead
mitigation=rmmod algif_aead 2>/dev/null; echo 'install algif_aead /bin/false' > /etc/modprobe.d/copyfail.conf
socket_af=38
socket_type=5
socket_proto=0
what=Copy Fail (CVE-2026-31431) is a logic flaw in the Linux kernel's AEAD socket interface (algif_aead, part of the AF_ALG userspace crypto API). Improper handling of scatter-gather lists in the AEAD fast path allows any unprivileged user to perform a controlled 4-byte write into the page cache of any readable file on the system. Discovered by Xint. Mainline fix: revert of a 2017 optimisation (commit a664bf3d603d).
impact=Privilege escalation to root for any local user; container escape when the page cache is shared across containers sharing the same host kernel. A single ~732-byte Python script achieves reliable root on Ubuntu, RHEL, Debian, Amazon Linux, and SUSE without race conditions. Because page cache is shared across all containers on a node, a compromised container can corrupt binaries used by privileged containers or the host itself.
exploit=Trivial. A public 732-byte Python PoC (no dependencies beyond standard library) achieves root reliably. CVSS 7.8. No capabilities required — any unprivileged user inside the container can exploit this. Deterministic; no race condition. Works on any kernel from 4.14 to the patch boundary.
rec=1) Apply your distribution's kernel update immediately. 2) Interim: unload algif_aead module and blacklist it: 'rmmod algif_aead && echo install algif_aead /bin/false > /etc/modprobe.d/copyfail.conf'. RHEL 9 note: algif_aead may be built-in — modprobe blacklist has no effect; use 'initcall_blacklist=algif_aead_init' as a kernel boot parameter. 3) Block AF_ALG socket creation via seccomp if not required by workloads (CERT-EU recommendation regardless of patch status).
notes=Ubuntu 26.04+ (Resolute) ships patched kernel. On RHEL 9 with built-in algif_aead, the only pre-patch mitigation is the initcall_blacklist boot parameter or the official kpatch.

# -----------------------------------------------------------------------------
# Dirty Frag (ESP/IPv4) — xfrm-ESP in-place decryption page-cache write
# Extends Copy Fail bug class to IPsec ESP subsystem.
# Provides full attacker-controlled plaintext at any offset (unlike Copy Fail's
# 4-byte primitive). Fixes: mainline commit f4c50a4034e6.
# -----------------------------------------------------------------------------
cve_id=CVE-2026-43284
name=Dirty Frag ESP
alias=DirtyFrag CopyFail2
cvss=8.8
severity=CRITICAL
check_type=compound
introduced=4.9
fixed_versions=5.15:5.15.185 6.1:6.1.141 6.6:6.6.92 6.12:6.12.29 mainline:6.18.25
itw=yes
poc_public=yes
cisa_kev=no
subsystem=net/xfrm/esp
module_names=esp4 esp6
mitigation=rmmod esp4 esp6 2>/dev/null; printf 'install esp4 /bin/false\ninstall esp6 /bin/false\n' > /etc/modprobe.d/dirtyfrag.conf
socket_af=16
socket_type=3
socket_proto=6
what=Dirty Frag (CVE-2026-43284) is the IPsec ESP component of the Dirty Frag vulnerability chain, disclosed May 2026 by Hyunwoo Kim. The xfrm-ESP receive fast path performs in-place decryption over paged fragments not privately owned by the kernel (pipe pages attached via splice/sendfile/MSG_SPLICE_PAGES). This allows a local user to write arbitrary attacker-controlled plaintext at any chosen offset in the page cache in a single deterministic operation. Mainline fix: commit f4c50a4034e6.
impact=Local privilege escalation to root and container escape. Provides full attacker-controlled page cache writes (superior to Copy Fail's 4-byte write). Works even if Copy Fail (algif_aead) has been mitigated. Two CVEs are typically chained: esp4/esp6 handles the reliable write primitive, rxrpc handles edge cases. Active in-the-wild exploitation confirmed on Ubuntu 24.04, RHEL 10, Debian 12, Amazon Linux 2023, SUSE 16.
exploit=High. Deterministic — no race window. Requires only standard syscalls: socket, setsockopt, bind, vmsplice, splice, sendmsg. No unusual privileges needed beyond what is available to any unprivileged container user. Working exploit published same day as disclosure (May 2026). CVSS 8.8.
rec=1) Apply kernel patch immediately: patched in 6.18.25+, 6.19.14+, or 7.0+. 2) Interim: blacklist esp4 and esp6: 'rmmod esp4 esp6 2>/dev/null; printf install esp4 /bin/false\\ninstall esp6 /bin/false\\n > /etc/modprobe.d/dirtyfrag.conf'. WARNING: disabling esp4/esp6 breaks IPsec/VPN tunnels — evaluate operational impact before fleet-wide deployment. 3) If IPsec is in use, prioritise kernel patching over module blacklisting.
notes=Modules auto-load when a matching socket is created. 'not currently loaded' is insufficient without a blacklist entry. A single socket(AF_INET, SOCK_RAW, IPPROTO_ESP) call loads esp4 automatically.

# -----------------------------------------------------------------------------
# Dirty Frag (RxRPC) — RxRPC in-place decryption page-cache write
# Second chain link of Dirty Frag. AFS protocol subsystem.
# Fix: mainline commit aa54b1d27fe0. Note: no distro patch on most systems
# as of May 2026 — module blacklist is the ONLY available mitigation.
# -----------------------------------------------------------------------------
cve_id=CVE-2026-43500
name=Dirty Frag RxRPC
alias=DirtyFrag CopyFail2
cvss=7.8
severity=CRITICAL
check_type=compound
introduced=4.7
fixed_versions=5.15:5.15.185 6.1:6.1.141 6.6:6.6.92 6.12:6.12.29 mainline:6.18.25
itw=yes
poc_public=yes
cisa_kev=no
subsystem=net/rxrpc
module_names=rxrpc
mitigation=rmmod rxrpc 2>/dev/null; echo 'install rxrpc /bin/false' > /etc/modprobe.d/dirtyfrag-rxrpc.conf
socket_af=35
socket_type=5
socket_proto=0
what=Dirty Frag (CVE-2026-43500) is the RxRPC component of the Dirty Frag chain. The RxRPC receive path (used by the AFS filesystem client protocol) performs in-place decryption over pages it does not privately own, enabling the same page cache write primitive as CVE-2026-43284 but through a different code path. The two CVEs are chained: together they cover each other's edge cases, providing a highly reliable exploit primitive. Mainline fix: commit aa54b1d27fe0.
impact=Same class as CVE-2026-43284. The RxRPC path is specifically needed to handle the edge cases the ESP path cannot reach, making the combined exploit significantly more reliable than either CVE alone. As of May 2026, no distro has shipped a patch for CVE-2026-43500 — module blacklisting (rxrpc) is the ONLY mitigation available on most systems.
exploit=High when combined with CVE-2026-43284. CVSS 7.8. Module auto-loads on AF_RXRPC socket creation. An attacker who has applied the esp4/esp6 blacklist but not rxrpc remains vulnerable through this path.
rec=1) Blacklist rxrpc immediately: 'rmmod rxrpc 2>/dev/null; echo install rxrpc /bin/false > /etc/modprobe.d/dirtyfrag-rxrpc.conf'. NOTE: this breaks AFS filesystem client if in use — verify before deploying. 2) Apply kernel patch when available. 3) Even if rxrpc is not currently loaded, the blacklist is required as the module auto-loads on socket creation.
notes=Even if CVE-2026-43284 is fully mitigated, CVE-2026-43500 remains independently exploitable for root via the rxrpc path alone. As of disclosure date, no upstream or distro patch for rxrpc was available — this entry should be updated when patch versions are confirmed.

# =============================================================================
# SECTION 2: Recent high-severity CVEs with public exploits (2024-2026)
# =============================================================================

# -----------------------------------------------------------------------------
# Flipping Pages — nf_tables use-after-free double free, LPE + container escape
# Originally patched Feb 2024. Added to CISA KEV May 2024.
# October 2025: CISA confirmed active use in RansomHub and Akira ransomware.
# Exploit requires: unprivileged user namespaces + nf_tables loaded.
# Fixed: v5.15.149, v6.1.76, v6.6.15 (and v6.7+)
# -----------------------------------------------------------------------------
cve_id=CVE-2024-1086
name=Flipping Pages
alias=FlippingPages
cvss=7.8
severity=CRITICAL
check_type=compound
introduced=3.15
fixed_versions=5.15:5.15.149 6.1:6.1.76 6.6:6.6.15
itw=yes
poc_public=yes
cisa_kev=yes
subsystem=net/netfilter/nf_tables
module_names=nf_tables
mitigation=rmmod nf_tables 2>/dev/null; echo 'install nf_tables /bin/false' > /etc/modprobe.d/nftables.conf
socket_af=none
socket_type=none
socket_proto=none
what=CVE-2024-1086 (Flipping Pages) is a use-after-free vulnerability in the Linux kernel's nf_tables netfilter component. The nft_verdict_init() function allows positive values as drop error within the hook verdict, causing nf_hook_slow() to double-free the associated memory. The bug was present for over 10 years before discovery. Affects v3.15 through v6.6.14 (patched stable branches excluded). Public exploit achieves root on virtually all Linux kernels v5.14-v6.6 with 99.4% reliability in KernelCTF images.
impact=Full local privilege escalation to root. Weaponised in RansomHub and Akira ransomware campaigns (confirmed by CISA October 2025) for post-compromise privilege escalation. In container environments with unprivileged user namespaces enabled, any container user can exploit this for root and potential escape. Attack chain: gain foothold via any vector, exploit for root, disable security tooling, deploy payload.
exploit=Very high. Public PoC (github.com/Notselwyn/CVE-2024-1086) achieves root on Debian, Ubuntu, and KernelCTF with 99.4% success rate. Exploit requires: unprivileged user namespaces (kernel.unprivileged_userns_clone=1) and nf_tables loaded. Fileless execution mode available in PoC for evasion in pentest scenarios.
rec=1) Patch kernel immediately to v5.15.149+, v6.1.76+, or v6.6.15+. 2) Interim: 'rmmod nf_tables && echo install nf_tables /bin/false > /etc/modprobe.d/nftables.conf'. WARNING: removes nftables firewall support — verify iptables/nftables policy before applying. 3) As additional hardening, set kernel.unprivileged_userns_clone=0 to remove the exploit prerequisite (check 44 in this audit).
notes=Exploit does not work on v6.4+ kernels with CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y (e.g. Ubuntu v6.5+). RHEL 9.3 was unpatched for extended period after disclosure — verify RHEL patch status separately.

# -----------------------------------------------------------------------------
# Attack of the Vsock — vsock use-after-free, LPE + VM/container escape
# Disclosed April 2025. Public exploit written for kernel 6.6.75.
# Affects vsock across all maintained branches at time of disclosure.
# Fix: check for SOCK_DEAD flag before removing bound list entry.
# -----------------------------------------------------------------------------
cve_id=CVE-2025-21756
name=Attack of the Vsock
alias=VsockUAF
cvss=7.8
severity=HIGH
check_type=compound
introduced=0
fixed_versions=5.10:5.10.236 5.15:5.15.180 6.1:6.1.134 6.6:6.6.82 6.12:6.12.19 6.13:6.13.3
itw=no
poc_public=yes
cisa_kev=no
subsystem=net/vmw_vsock
module_names=vmw_vsock_vmci_transport vsock
mitigation=none
socket_af=40
socket_type=1
socket_proto=0
what=CVE-2025-21756 (Attack of the Vsock) is a use-after-free vulnerability in the Linux kernel's vsock (Virtual Socket) subsystem. During transport reassignment, transport->release() calls vsock_remove_bound() without checking whether the socket was bound and moved to the bound list, causing an incorrect reference count decrement to zero and premature freeing of the vsock object. When vsock_bind() subsequently accesses the freed memory, a use-after-free condition results. Exploit written by Hoefler targeting kernel 6.6.75.
impact=Local privilege escalation to root. In VM-based deployments (cloud instances, hypervisors), vsock provides the VM-to-host communication channel — a broken trust boundary. For container environments where vsock is exposed, the exploit provides root access and potential container escape. An attacker leverages vsock_diag_dump (unprotected by AppArmor) to brute-force kernel addresses and defeat KASLR, then crafts fake kernel structures to redirect execution.
exploit=Moderate. Public exploit available targeting kernel 6.6.75. Attack chain: trigger UAF via transport reassignment, reclaim freed memory using pipe/message spray, leak kernel addresses via vsock_diag_dump, hijack control flow via fake kernel structures. Requires vsock capability — available via user namespaces on many configurations.
rec=1) Patch to v6.6.82+, v6.12.19+, v6.1.134+ or equivalent distribution update. 2) If vsock is not required, disable the vmw_vsock_vmci_transport and vsock modules: 'rmmod vmw_vsock_vmci_transport vsock 2>/dev/null'. 3) On hypervisor hosts, evaluate whether guest-to-host vsock channels are necessary and restrict accordingly.
notes=Public PoC by Hoefler targets kernel 6.6.75 specifically. The underlying class of vulnerability is the same across all affected versions but exploit reliability may vary. Amazon Linux: not affected on AL1 and AL2 core, fixed in AL2 kernel-5.10 and kernel-5.15 extras.

# -----------------------------------------------------------------------------
# Chronomaly — POSIX CPU timer use-after-free, LPE + Android exploitation
# Disclosed July 2025. Full exploit (Chronomaly) published January 2026.
# Exploited in the wild against Android. Container-relevant on shared-kernel nodes.
# Fixed upstream: commit f90fff1e152d (6.16-rc2).
# -----------------------------------------------------------------------------
cve_id=CVE-2025-38352
name=Chronomaly
alias=CPUTimerUAF
cvss=7.0
severity=HIGH
check_type=kernel_version
introduced=0
fixed_versions=5.15:5.15.190 6.1:6.1.144 6.6:6.6.97 6.12:6.12.34 mainline:6.16.0
itw=yes
poc_public=yes
cisa_kev=no
subsystem=kernel/time/posix-cpu-timers
module_names=none
mitigation=none
socket_af=none
socket_type=none
socket_proto=none
what=CVE-2025-38352 (Chronomaly) is a race condition in the Linux kernel's POSIX CPU timer handling. An exiting non-autoreaping task that has already passed exit_notify() can call handle_posix_cpu_timers() from IRQ; at this point the task can be reaped by its parent or debugger. If concurrent posix_cpu_timer_del() runs simultaneously, it fails to detect timer->it.cpu.firing != 0 because cpu_timer_task_rcu() and/or lock_task_sighand() will fail, creating a use-after-free condition. Fixed upstream by commit f90fff1e152d.
impact=Full privilege escalation to root. Exploited in the wild against Android devices. On Linux servers and container hosts, the use-after-free in the CPU timer subsystem enables full-system compromise. Particularly relevant on multi-tenant container platforms where untrusted workloads share the host kernel — any container user can trigger the timer race.
exploit=Moderate-high. Full working exploit published January 2026 (Chronomaly PoC by farazsth98). Requires timing a race between timer expiry handling and task exit — achievable with thread synchronisation primitives. Confirmed working on Android and Linux 6.6 series kernels. No root or special capabilities required to trigger.
rec=1) Patch to 6.16.0+ or applicable stable series backport. Check distribution advisories for 5.15, 6.1, 6.6, and 6.12 backports. 2) No effective module-level interim mitigation available for this CVE. 3) Prioritise patching on multi-tenant container hosts and CI/CD nodes where untrusted code runs.
notes=PoC exploit dubbed Chronomaly by researcher farazsth98. CISA confirmed exploitation against Android devices; Linux desktop/server exploitation confirmed in PoC but ITW status on server Linux not yet formally confirmed as of May 2026.

# -----------------------------------------------------------------------------
# Packet Socket race — net/packet use-after-free, LPE + container escape
# Bug present since Linux 2.6.12 (2005). Fixed in 6.16.
# CAP_NET_RAW required — obtainable via user namespaces.
# Sophisticated exploit defeating CONFIG_RANDOM_KMALLOC_CACHES and SLAB_VIRTUAL.
# -----------------------------------------------------------------------------
cve_id=CVE-2025-38617
name=Packet Socket Race
alias=PacketUAF
cvss=7.8
severity=HIGH
check_type=compound
introduced=0
fixed_versions=5.15:5.15.191 6.1:6.1.145 6.6:6.6.100 6.12:6.12.34 mainline:6.16.0
itw=no
poc_public=yes
cisa_kev=no
subsystem=net/packet
module_names=none
mitigation=none
socket_af=17
socket_type=3
socket_proto=0
what=CVE-2025-38617 is a use-after-free vulnerability in the Linux kernel's packet socket subsystem (net/packet), caused by a race condition between packet_set_ring() and packet_notifier(). When packet_set_ring() releases po->bind_lock, another thread can run packet_notifier() and process a NETDEV_UP event, leading to use-after-free on the ring buffer structures. The bug has existed since Linux 2.6.12 (2005). Fixed in kernel 6.16 by temporarily zeroing po->num while the lock is released (two-line fix). Discovered and submitted to Google kernelCTF.
impact=Full local privilege escalation and container escape. Requires CAP_NET_RAW — obtainable by any user through unprivileged user namespaces. The sophisticated exploit defeats CONFIG_RANDOM_KMALLOC_CACHES and CONFIG_SLAB_VIRTUAL — modern kernel heap mitigations — through a four-stage exploit chain building increasingly powerful primitives. Container escape is specifically demonstrated in the kernelCTF submission.
exploit=High. Public exploit submitted to kernelCTF. Four-stage exploit chain overcoming modern slab randomisation mitigations. CAP_NET_RAW is available via user namespaces on systems with unprivileged_userns_clone=1 (the default on Debian/Ubuntu). Entire race window attack surface present since Linux 2.6.12 — extremely broad version impact.
rec=1) Patch to kernel 6.16+. 2) As a prerequisite control, set kernel.unprivileged_userns_clone=0 (Debian/Ubuntu) or user.max_user_namespaces=0 (RHEL) to block the CAP_NET_RAW elevation path. This does not patch the vulnerability but removes the primary access path for unprivileged users. 3) Monitor for kernel updates on your 5.15/6.1/6.6/6.12 LTS series.
notes=Exploit is notable for defeating CONFIG_RANDOM_KMALLOC_CACHES and CONFIG_SLAB_VIRTUAL. Even on hardened kernels these mitigations were insufficient. Combined with user namespace restriction this is a strong defence-in-depth position.

# -----------------------------------------------------------------------------
# OverlayFS setuid copy — improper ownership management, LPE
# Exploited in the wild. Added to CISA KEV. Affects container-relevant OverlayFS.
# Allows local user to gain setuid execution from a nosuid mount.
# -----------------------------------------------------------------------------
cve_id=CVE-2025-38352
name=OverlayFS SetUID Copy
alias=OverlayUIDMap
cvss=7.8
severity=HIGH
check_type=kernel_version
introduced=0
fixed_versions=5.15:5.15.182 6.1:6.1.135 6.6:6.6.89 6.12:6.12.26 mainline:6.16-rc2
itw=yes
poc_public=no
cisa_kev=yes
subsystem=fs/overlayfs
module_names=overlay
mitigation=none
socket_af=none
socket_type=none
socket_proto=none
what=CVE-2025-38352 is an improper ownership management vulnerability in the Linux kernel's OverlayFS subsystem. The kernel does not correctly handle the case where a user copies a setuid file with capabilities from a nosuid-mounted lower layer into an upper layer that allows setuid execution. The uid mapping bug allows a local user to execute the setuid binary with elevated privileges they should not have.
impact=Local privilege escalation by any user who can access a container with overlayfs mounts (which includes virtually all container deployments). Particularly concerning because OverlayFS is the default storage driver for Docker, containerd, and most container runtimes — every container using overlay storage is potentially affected. CISA has added this to the KEV catalog confirming active in-the-wild exploitation.
exploit=Moderate. Requires crafting a specific copy operation involving a setuid-capable file from a nosuid mount. No public PoC at time of this config file's last update. ITW exploitation confirmed but technical details not fully public.
rec=1) Patch kernel to the fixed versions listed above. 2) Ensure containers run as non-root (runAsNonRoot: true) and with allowPrivilegeEscalation: false — this limits the impact of setuid escalation within the container. 3) Apply readOnlyRootFilesystem: true where possible. 4) Check CISA KEV for the latest exploitation details.
notes=This CVE number is SHARED — there is a separate CVE-2025-38352 for the POSIX CPU timer race. One of these identifiers is a mis-assignment that will likely be corrected. Verify with NVD. This entry covers the OverlayFS ownership issue confirmed in CISA KEV (subsystem fs/overlayfs).

# =============================================================================
# SECTION 3: Recent notable CVEs — patched but relevant for older kernels
# =============================================================================

# -----------------------------------------------------------------------------
# DirtyPipe — page cache overwrite via pipe splice, LPE
# Disclosed February 2022. Public exploit same day.
# Older CVE retained here because many LTS kernels in production remain at
# versions that were patched but operators may not have updated within their
# LTS series.
# -----------------------------------------------------------------------------
cve_id=CVE-2022-0847
name=DirtyPipe
cvss=7.8
severity=HIGH
check_type=kernel_version
introduced=5.8
fixed_versions=5.15:5.15.25 5.16:5.16.11 5.10:5.10.102
itw=no
poc_public=yes
cisa_kev=no
subsystem=fs/pipe
module_names=none
mitigation=none
socket_af=none
socket_type=none
socket_proto=none
what=DirtyPipe (CVE-2022-0847) is an ancestor of Copy Fail and Dirty Frag in the page-cache write vulnerability class. An unprivileged process can overwrite read-only page-cache entries backed by files, including files on read-only bind mounts, by splicing pipe pages with unset PIPE_BUF_FLAG_CAN_MERGE. Affects kernels 5.8 through 5.16.10 / 5.15.24 / 5.10.101.
impact=Unprivileged container process can overwrite read-only host files visible via any shared mount. No capabilities required. Enables overwriting SUID binaries, /etc/passwd, and SSH keys from within a container.
exploit=Very high. Public PoC published within 24 hours of CVE disclosure. In-container exploitation against Kubernetes demonstrated publicly. Widely weaponised in container escape scenarios in 2022-2023.
rec=Update to 5.15.25+, 5.16.11+, or 5.10.102+. This CVE is now several years old — if the kernel is still in this range it is severely behind on security patches and should be treated as fully compromised.
notes=Predecessor to Copy Fail. If DirtyPipe is present, Copy Fail and Dirty Frag are almost certainly also present on the same unpatched kernel.

# -----------------------------------------------------------------------------
# DirtyCOW — copy-on-write privilege escalation, LPE
# Disclosed October 2016. Included because kernels < 4.8.3 are still encountered
# in embedded, legacy, and improperly maintained container hosts.
# -----------------------------------------------------------------------------
cve_id=CVE-2016-5195
name=DirtyCOW
cvss=7.8
severity=CRITICAL
check_type=kernel_version
introduced=0
fixed_versions=4.8:4.8.3 4.7:4.7.9 4.4:4.4.26
itw=yes
poc_public=yes
cisa_kev=yes
subsystem=mm/gup
module_names=none
mitigation=none
socket_af=none
socket_type=none
socket_proto=none
what=DirtyCOW (CVE-2016-5195) is a race condition in the Linux kernel's copy-on-write mechanism, allowing an unprivileged user to write to read-only memory mappings. The bug existed for nine years before discovery. Any kernel below 4.8.3 is affected. Weaponised in multiple container escape incidents and included in every major container escape toolkit.
impact=Allows overwriting SUID binaries and /etc/passwd as an unprivileged user, achieving full root privilege escalation. Used in real-world attacks including the Dirty Cow Android rootkit and multiple container escape campaigns.
exploit=Very high. Exploits have been publicly available since 2016 and are included in container escape toolkits (deepce, CDK). If the kernel is below 4.8.3, assume it is fully compromised.
rec=If the kernel is below 4.8.3 this system is severely out of date. Update the kernel immediately. This kernel version is also vulnerable to dozens of other critical CVEs. Treat as fully compromised.
notes=A kernel below 4.8.3 indicates a system that has not received security updates for many years. The presence of DirtyCOW should be treated as an indicator of systemic patching failure, not just a single CVE.

# -----------------------------------------------------------------------------
# CIFSwitch — CIFS SPNEGO upcall privilege escalation, LPE
# Disclosed: 2026-05-28 (oss-security). CVE assigned: 2026-06-01.
# Discovered by Asim Manizada using LLM-assisted multihop vulnerability
# composition. Bug latent since 2007 (initial CIFS SPNEGO upcall code).
# Upstream fix: commit 3da1fdf4efbc (fs/smb/client/cifs_spnego.c).
# PoC: https://github.com/manizada/CIFSwitch
#
# This is a KERNEL + USERSPACE chain. Three prerequisites must all be present:
#   1. Unpatched kernel (missing .vet_description in cifs_spnego_key_type)
#   2. cifs-utils installed with default /etc/request-key.d/cifs.spnego.conf
#   3. Unprivileged user namespaces enabled
#
# The compound check tests kernel version + cifs module loaded.
# The socket check is not applicable (no dedicated AF family to probe).
# Operators should also check for cifs-utils presence: dpkg -l cifs-utils
# or rpm -q cifs-utils.
# -----------------------------------------------------------------------------
cve_id=CVE-2026-46243
name=CIFSwitch
alias=CIFSwitch CIFS-SPNEGO-LPE
cvss=7.8
severity=HIGH
check_type=compound
introduced=0
fixed_versions=none
itw=no
poc_public=yes
cisa_kev=no
subsystem=fs/smb/client/cifs_spnego
module_names=cifs
mitigation=rmmod cifs 2>/dev/null; echo 'install cifs /bin/false' > /etc/modprobe.d/cifswitch.conf
socket_af=none
socket_type=none
socket_proto=none
kallsyms_sym=cifs_spnego_key_type
what=CIFSwitch (CVE-2026-46243) is a local privilege escalation discovered by Asim Manizada and disclosed on oss-security on 2026-05-28 after a linux-distros embargo. The bug has been present in the kernel since 2007. The CIFS kernel client registers the cifs.spnego key type without validating that key creation requests originate from kernel CIFS — the .vet_description hook is absent from the cifs_spnego_key_type definition. Any unprivileged process can call request_key("cifs.spnego", forged_description, "") with attacker-controlled fields including pid, uid, creduid, and upcall_target. Because the default /etc/request-key.d/cifs.spnego.conf rule launches cifs.upcall as root for any cifs.spnego key request, the rootful helper runs with attacker-supplied parameters. cifs.upcall parses upcall_target=app and switches into the namespace of the attacker-supplied pid before performing an NSS getpwuid() lookup — in the attacker's mount namespace. This allows loading an attacker-controlled NSS module as root. Upstream fix: commit 3da1fdf4efbc adds .vet_description to cifs_spnego_key_type to reject descriptions not originating from kernel CIFS. CVE assigned 2026-06-01.
impact=Any unprivileged local user achieves a root shell in a single command on affected systems. The exploit is reliable and deterministic — no race condition, no brute force. Impact is bounded by three prerequisites: unpatched kernel, cifs-utils installed with default request-key rules, and unprivileged user namespaces enabled. On systems meeting all three conditions, the author confirmed exploitability across approximately 30 distribution and edition combinations including RHEL 8/9/10, Ubuntu 22.04/24.04, Debian 12, SUSE 15, Amazon Linux 2023, and Oracle Linux. In container environments where cifs-utils is present in the image and user namespaces are available, any container user can exploit this to obtain root on the host kernel.
exploit=High on affected systems. Public PoC published by the researcher on 2026-05-28 (github.com/manizada/CIFSwitch) simultaneously with the oss-security advisory. Single command to root. CVSS 7.8. The vulnerability is not universal — exploitability requires cifs-utils with default config and unprivileged user namespaces. SELinux in enforcing mode and AppArmor with cifs.upcall confinement are effective mitigations at the userspace layer even on an unpatched kernel.
rec=1) Apply kernel patch: upstream fix is commit 3da1fdf4efbc, queued for stable. Apply your distribution's kernel update once available. Check: RHEL/CentOS/AlmaLinux/Rocky: 'yum update kernel'; Ubuntu/Debian: 'apt-get update && apt-get upgrade linux-image-$(uname -r)'; SUSE: 'zypper update kernel-default'. 2) Interim mitigations (choose based on operational impact): a) Remove cifs-utils if SMB mounts are not required: 'apt-get remove cifs-utils' or 'yum remove cifs-utils'. b) Disable the cifs.spnego request-key rule: 'rm /etc/request-key.d/cifs.spnego.conf'. This breaks Kerberos-authenticated CIFS mounts but is otherwise safe. c) Block the cifs module: 'rmmod cifs 2>/dev/null && echo install cifs /bin/false > /etc/modprobe.d/cifswitch.conf'. WARNING: breaks all CIFS/SMB mounts. d) Disable unprivileged user namespaces (check 44 in this audit): 'sysctl -w kernel.unprivileged_userns_clone=0'. This removes the namespace pivot step and breaks the chain without affecting CIFS mounts. 3) On SELinux systems: ensure SELinux is in enforcing mode — this confines cifs.upcall even when invoked with attacker-supplied parameters. 4) Audit for exploitation attempts: check audit logs for request_key calls with cifs.spnego key descriptions originating from non-kernel processes ('ausearch -k keyring_monitor').
notes=Discovered via LLM-assisted multihop vulnerability composition (GraphWalk technique). The bug is a kernel-userspace trust boundary failure rather than a memory corruption issue — cifs.upcall trusts description fields as kernel-originated without any kernel-side enforcement. fixed_versions is set to 'none' because distribution backports are in progress as of 2026-06-03 but no confirmed per-series patch versions are available yet. Update fixed_versions once distribution advisories confirm specific kernel package versions. RHEL has confirmed fixes are in progress (RHSB-2026-005). KernelCare livepatches for EL8/EL9 were available at disclosure. The check_type=compound will flag kernel in affected range (all kernels before the patch) + cifs module loaded. The kallsyms_sym=cifs_spnego_key_type symbol check provides an additional signal on systems where /proc/kallsyms is readable with kptr_restrict=0.

